name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

env:
  MAVEN_OPTS: -Xmx2g

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Verify
        run: mvn verify -Dwagon.skip=true
