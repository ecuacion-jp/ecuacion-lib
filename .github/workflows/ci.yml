name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

env:
  MAVEN_OPTS: -Xmx2g

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Validate POM after version update
        run: |
          mvn versions:set -DnewVersion=0.0.0-CI-TEST -DgenerateBackupPoms=false
          mvn versions:update-properties -Dincludes=jp.ecuacion.lib -DgenerateBackupPoms=false
          mvn validate
          git checkout -- .

      - name: Verify
        run: mvn verify -Dwagon.skip=true

      - name: Upload coverage to Codecov
        if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'pull_request' && github.base_ref == 'main')
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: >-
            ecuacion-lib-core/target/site/jacoco/jacoco.xml,
            ecuacion-lib-validation/target/site/jacoco/jacoco.xml
          fail_ci_if_error: false
