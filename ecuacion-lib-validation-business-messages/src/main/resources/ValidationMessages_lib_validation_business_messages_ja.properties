jakarta.validation.constraints.Future.message.default          = 今日より後の日付を入力してください
jakarta.validation.constraints.FutureOrPresent.message.default = 今日以降の日付を入力してください
jakarta.validation.constraints.Max.message.default             = {value}以下の数値を入力してください
jakarta.validation.constraints.Min.message.default             = {value}以上の数値を入力してください
jakarta.validation.constraints.Negative.message.default        = 0より小さい数値を入力してください
jakarta.validation.constraints.NegativeOrZero.message.default  = 0以下の数値を入力してください
jakarta.validation.constraints.NotBlank.message.default        = スペースのみの入力はできません
jakarta.validation.constraints.NotEmpty.message.default        = 入力必須です
jakarta.validation.constraints.NotNull.message.default         = 入力必須です
jakarta.validation.constraints.Null.message.default            = 入力不可です
jakarta.validation.constraints.Past.message.default            = 今日より前の日付を入力してください
jakarta.validation.constraints.PastOrPresent.message.default   = 今日以前の日付を入力してください
jakarta.validation.constraints.Pattern.message.default         = 正しい形式で入力してください
jakarta.validation.constraints.Positive.message.default        = 0より大きい数値を入力してください
jakarta.validation.constraints.PositiveOrZero.message.default  = 0以上の数値を入力してください
jakarta.validation.constraints.Size.message.default            = {min}文字以上{max}文字以内で入力してください

