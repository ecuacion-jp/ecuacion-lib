jakarta.validation.constraints.AssertTrue.message.default      = オンにしてください
jakarta.validation.constraints.DecimalMax.message.default      = {value}${inclusive == true ? '以下の数値を入力してください' : 'より小さい数値を入力してください'}
jakarta.validation.constraints.DecimalMin.message.default      = {value}${inclusive == true ? '以上の数値を入力してください' : 'より大きい数値を入力してください'}
jakarta.validation.constraints.Digits.message.default          = 整数{integer}桁以内、小数点以下{fraction}桁以内の数値を入力してください
