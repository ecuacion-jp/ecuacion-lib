# Business-friendly English messages with item names for Jakarta Validation standard constraints
# These override the neutral HV-standard messages provided by ecuacion-lib-core
jakarta.validation.constraints.AssertFalse.message.default     = {0} must be off (input: {invalidValue})
jakarta.validation.constraints.AssertTrue.message.default      = {0} must be on (input: {invalidValue})
jakarta.validation.constraints.DecimalMax.message.default      = {0} must be ${inclusive == true ? 'at most' : 'less than'} {value} (input: {invalidValue})
jakarta.validation.constraints.DecimalMin.message.default      = {0} must be ${inclusive == true ? 'at least' : 'greater than'} {value} (input: {invalidValue})
jakarta.validation.constraints.Digits.message.default          = {0} must have at most {integer} integer digits and {fraction} fractional digits (input: {invalidValue})
jakarta.validation.constraints.Email.message.default           = {0} must be a valid email address (input: {invalidValue})
jakarta.validation.constraints.Future.message.default          = {0} must be after today (input: {invalidValue})
jakarta.validation.constraints.FutureOrPresent.message.default = {0} must be today or later (input: {invalidValue})
jakarta.validation.constraints.Max.message.default             = {0} must be {value} or less (input: {invalidValue})
jakarta.validation.constraints.Min.message.default             = {0} must be {value} or more (input: {invalidValue})
jakarta.validation.constraints.Negative.message.default        = {0} must be a negative number (input: {invalidValue})
jakarta.validation.constraints.NegativeOrZero.message.default  = {0} must be 0 or negative (input: {invalidValue})
jakarta.validation.constraints.NotBlank.message.default        = {0} must not contain only spaces
jakarta.validation.constraints.NotEmpty.message.default        = {0} is required
jakarta.validation.constraints.NotNull.message.default         = {0} is required
jakarta.validation.constraints.Null.message.default            = {0} must not be entered (input: {invalidValue})
jakarta.validation.constraints.Past.message.default            = {0} must be before today (input: {invalidValue})
jakarta.validation.constraints.PastOrPresent.message.default   = {0} must be today or earlier (input: {invalidValue})
jakarta.validation.constraints.Pattern.message.default         = {0} must be in the correct format (input: {invalidValue})
jakarta.validation.constraints.Positive.message.default        = {0} must be a positive number (input: {invalidValue})
jakarta.validation.constraints.PositiveOrZero.message.default  = {0} must be 0 or positive (input: {invalidValue})
jakarta.validation.constraints.Size.message.default            = {0} must be between {min} and {max} characters (input: {invalidValue})

# Business-friendly English messages with item names for ecuacion-lib-validation field constraints
jp.ecuacion.lib.validation.constraints.SizeString.message.default             = {0} must be between {min} and {max} characters (input: {invalidValue})
jp.ecuacion.lib.validation.constraints.BooleanString.message.default          = {0} must be "true" or "false" (input: {invalidValue})
jp.ecuacion.lib.validation.constraints.IntegerString.message.default          = {0} must be an integer (input: {invalidValue})
jp.ecuacion.lib.validation.constraints.LongString.message.default             = {0} must be an integer (input: {invalidValue})
jp.ecuacion.lib.validation.constraints.EnumElement.message.default            = {0} must be a valid selection (input: {invalidValue})
jp.ecuacion.lib.validation.constraints.PatternWithDescription.message.default = {0} must match "{description}" (input: {invalidValue})

