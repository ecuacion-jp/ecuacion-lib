# Business-friendly English messages for Jakarta Validation standard constraints.
# These override the neutral HV-standard messages provided by ecuacion-lib-core.
jakarta.validation.constraints.AssertFalse.message.default     = must be off
jakarta.validation.constraints.AssertTrue.message.default      = must be on
jakarta.validation.constraints.DecimalMax.message.default      = must be ${inclusive == true ? 'at most' : 'less than'} {value}
jakarta.validation.constraints.DecimalMin.message.default      = must be ${inclusive == true ? 'at least' : 'greater than'} {value}
jakarta.validation.constraints.Digits.message.default          = must have at most {integer} integer digits and {fraction} fractional digits
jakarta.validation.constraints.Email.message.default           = must be a valid email address
jakarta.validation.constraints.Future.message.default          = must be after today
jakarta.validation.constraints.FutureOrPresent.message.default = must be today or later
jakarta.validation.constraints.Max.message.default             = must be {value} or less
jakarta.validation.constraints.Min.message.default             = must be {value} or more
jakarta.validation.constraints.Negative.message.default        = must be a negative number
jakarta.validation.constraints.NegativeOrZero.message.default  = must be 0 or negative
jakarta.validation.constraints.NotBlank.message.default        = must not contain only spaces
jakarta.validation.constraints.NotEmpty.message.default        = is required
jakarta.validation.constraints.NotNull.message.default         = is required
jakarta.validation.constraints.Null.message.default            = must not be entered
jakarta.validation.constraints.Past.message.default            = must be before today
jakarta.validation.constraints.PastOrPresent.message.default   = must be today or earlier
jakarta.validation.constraints.Pattern.message.default         = must be in the correct format
jakarta.validation.constraints.Positive.message.default        = must be a positive number
jakarta.validation.constraints.PositiveOrZero.message.default  = must be 0 or positive
jakarta.validation.constraints.Size.message.default            = must be between {min} and {max} characters

# Business-friendly English messages for ecuacion-lib-validation field constraints.
jp.ecuacion.lib.validation.constraints.SizeString.message.default             = must be between {min} and {max} characters
jp.ecuacion.lib.validation.constraints.BooleanString.message.default          = must be "true" or "false"
jp.ecuacion.lib.validation.constraints.IntegerString.message.default          = must be an integer
jp.ecuacion.lib.validation.constraints.LongString.message.default             = must be an integer
jp.ecuacion.lib.validation.constraints.EnumElement.message.default            = must be a valid selection
jp.ecuacion.lib.validation.constraints.PatternWithDescription.message.default = must match "{description}"

# Business-friendly English messages for ecuacion-lib-validation class constraints.
jp.ecuacion.lib.validation.constraints.AnyNull.message.default                    = any of {0} must be left empty
jp.ecuacion.lib.validation.constraints.AnyNotNull.message.default                 = at least one of {0} must be provided
jp.ecuacion.lib.validation.constraints.AllNullOrAllNotNull.message.default        = all of {0} must be provided or all must be left empty
jp.ecuacion.lib.validation.constraints.AnyEmpty.message.default                   = any of {0} must be blank
jp.ecuacion.lib.validation.constraints.AnyNotEmpty.message.default                = at least one of {0} must be provided
jp.ecuacion.lib.validation.constraints.AllEmptyOrAllNotEmpty.message.default      = all of {0} must be filled in or all must be blank
jp.ecuacion.lib.validation.constraints.GreaterThan.message.default                = must be greater than {baselinePropertyPathItemName}
jp.ecuacion.lib.validation.constraints.GreaterThanOrEqualTo.message.default       = must be greater than or equal to {baselinePropertyPathItemName}
jp.ecuacion.lib.validation.constraints.LessThan.message.default                   = must be less than {baselinePropertyPathItemName}
jp.ecuacion.lib.validation.constraints.LessThanOrEqualTo.message.default          = must be less than or equal to {baselinePropertyPathItemName}
jp.ecuacion.lib.validation.constraints.NullWhen.message.default                   = must be left empty when {conditionPropertyPathItemName} {displayStringOfConditionValue}{validatesWhenConditionNotSatisfiedDescription}
jp.ecuacion.lib.validation.constraints.NotNullWhen.message.default                = must be provided when {conditionPropertyPathItemName} {displayStringOfConditionValue}{validatesWhenConditionNotSatisfiedDescription}
jp.ecuacion.lib.validation.constraints.EmptyWhen.message.default                  = must be blank when {conditionPropertyPathItemName} {displayStringOfConditionValue}{validatesWhenConditionNotSatisfiedDescription}
jp.ecuacion.lib.validation.constraints.NotEmptyWhen.message.default               = must be provided when {conditionPropertyPathItemName} {displayStringOfConditionValue}{validatesWhenConditionNotSatisfiedDescription}
jp.ecuacion.lib.validation.constraints.TrueWhen.message.default                   = must be on when {conditionPropertyPathItemName} {displayStringOfConditionValue}{validatesWhenConditionNotSatisfiedDescription}
jp.ecuacion.lib.validation.constraints.FalseWhen.message.default                  = must be off when {conditionPropertyPathItemName} {displayStringOfConditionValue}{validatesWhenConditionNotSatisfiedDescription}
jp.ecuacion.lib.validation.constraints.StringWhen.message.default                 = must be the specified value when {conditionPropertyPathItemName} {displayStringOfConditionValue}{validatesWhenConditionNotSatisfiedDescription}
jp.ecuacion.lib.validation.constraints.NotStringWhen.message.default              = must not be the specified value when {conditionPropertyPathItemName} {displayStringOfConditionValue}{validatesWhenConditionNotSatisfiedDescription}
jp.ecuacion.lib.validation.constraints.PatternWhen.message.default                = must match the specified format when {conditionPropertyPathItemName} {displayStringOfConditionValue}{validatesWhenConditionNotSatisfiedDescription}
jp.ecuacion.lib.validation.constraints.NotPatternWhen.message.default             = must not match the specified format when {conditionPropertyPathItemName} {displayStringOfConditionValue}{validatesWhenConditionNotSatisfiedDescription}
jp.ecuacion.lib.validation.constraints.ValueOfPropertyPathWhen.message.default    = must match the value of another field when {conditionPropertyPathItemName} {displayStringOfConditionValue}{validatesWhenConditionNotSatisfiedDescription}
jp.ecuacion.lib.validation.constraints.NotValueOfPropertyPathWhen.message.default = must not match the value of another field when {conditionPropertyPathItemName} {displayStringOfConditionValue}{validatesWhenConditionNotSatisfiedDescription}
