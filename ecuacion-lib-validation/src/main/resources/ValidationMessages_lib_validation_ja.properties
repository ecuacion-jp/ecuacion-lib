# field validators
jp.ecuacion.lib.validation.constraints.SizeString.message.base             = 文字数を{min}から{max}の間にしてください
jp.ecuacion.lib.validation.constraints.BooleanString.message.base          = 真偽値を表す文字列（"true", "false", "on", "off", "yes", "no", "t", "f", "y", "n", "○", "×"）にしてください
jp.ecuacion.lib.validation.constraints.IntegerString.message.base          = 通常の範囲の整数値にしてください
jp.ecuacion.lib.validation.constraints.LongString.message.base             = 通常の範囲の整数値にしてください
jp.ecuacion.lib.validation.constraints.EnumElement.message.base            = Enum: {enumClass} の要素にしてください
jp.ecuacion.lib.validation.constraints.PatternWithDescription.message.base = 正規表現"{description}"にマッチさせてください

