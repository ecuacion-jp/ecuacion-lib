# field validators
jp.ecuacion.lib.validation.constraints.SizeString.message.base             = size must be between {min} and {max}
jp.ecuacion.lib.validation.constraints.BooleanString.message.base          = must be a string which expresses boolean ("true", "false", "on", "off", "yes", "no", "t", "f", "y", "n", "\u25CB", "�")
jp.ecuacion.lib.validation.constraints.IntegerString.message.base          = must be common sense range integer
jp.ecuacion.lib.validation.constraints.LongString.message.base             = must be common sense range integer
jp.ecuacion.lib.validation.constraints.EnumElement.message.base            = must be an enum element of {enumClass}
jp.ecuacion.lib.validation.constraints.PatternWithDescription.message.base = must match "{description}"

# class validators
jp.ecuacion.lib.validation.constraints.AnyNull.message.base                    = must be null
jp.ecuacion.lib.validation.constraints.AnyNotNull.message.base                 = must not be null
jp.ecuacion.lib.validation.constraints.AllNullOrAllNotNull.message.base        = must be null or not null
jp.ecuacion.lib.validation.constraints.AnyEmpty.message.base                   = must be empty
jp.ecuacion.lib.validation.constraints.AnyNotEmpty.message.base                = must not be empty
jp.ecuacion.lib.validation.constraints.AllEmptyOrAllNotEmpty.message.base      = must be empty or not empty
jp.ecuacion.lib.validation.constraints.GreaterThan.message.base                = must be greater than the value of {baselinePropertyPathItemName}
jp.ecuacion.lib.validation.constraints.GreaterThanOrEqualTo.message.base       = must be greater than or equal to the value of {baselinePropertyPathItemName}
jp.ecuacion.lib.validation.constraints.LessThan.message.base                   = must be less than the value of {baselinePropertyPathItemName}
jp.ecuacion.lib.validation.constraints.LessThanOrEqualTo.message.base          = must be less than or equal to the value of {baselinePropertyPathItemName}
jp.ecuacion.lib.validation.constraints.NullWhen.message.base                   = must be null when {conditionPropertyPathItemName} {displayStringOfConditionValue}{validatesWhenConditionNotSatisfiedDescription}
jp.ecuacion.lib.validation.constraints.NotNullWhen.message.base                = must not be null when {conditionPropertyPathItemName} {displayStringOfConditionValue}{validatesWhenConditionNotSatisfiedDescription}
jp.ecuacion.lib.validation.constraints.EmptyWhen.message.base                  = must be empty when {conditionPropertyPathItemName} {displayStringOfConditionValue}{validatesWhenConditionNotSatisfiedDescription}
jp.ecuacion.lib.validation.constraints.NotEmptyWhen.message.base               = must not be empty when {conditionPropertyPathItemName} {displayStringOfConditionValue}{validatesWhenConditionNotSatisfiedDescription}
jp.ecuacion.lib.validation.constraints.TrueWhen.message.base                   = must be true when {conditionPropertyPathItemName} {displayStringOfConditionValue}{validatesWhenConditionNotSatisfiedDescription}
jp.ecuacion.lib.validation.constraints.FalseWhen.message.base                  = must be false when {conditionPropertyPathItemName} {displayStringOfConditionValue}{validatesWhenConditionNotSatisfiedDescription}
jp.ecuacion.lib.validation.constraints.StringWhen.message.base                 = must be a specific value when {conditionPropertyPathItemName} {displayStringOfConditionValue}{validatesWhenConditionNotSatisfiedDescription}
jp.ecuacion.lib.validation.constraints.NotStringWhen.message.base              = must not be a specific value when {conditionPropertyPathItemName} {displayStringOfConditionValue}{validatesWhenConditionNotSatisfiedDescription}
jp.ecuacion.lib.validation.constraints.PatternWhen.message.base                = must match the pattern when {conditionPropertyPathItemName} {displayStringOfConditionValue}{validatesWhenConditionNotSatisfiedDescription}
jp.ecuacion.lib.validation.constraints.NotPatternWhen.message.base             = must not match the pattern when {conditionPropertyPathItemName} {displayStringOfConditionValue}{validatesWhenConditionNotSatisfiedDescription}
jp.ecuacion.lib.validation.constraints.ValueOfPropertyPathWhen.message.base    = must be the value of a specific field when {conditionPropertyPathItemName} {displayStringOfConditionValue}{validatesWhenConditionNotSatisfiedDescription}
jp.ecuacion.lib.validation.constraints.NotValueOfPropertyPathWhen.message.base = must not be the value of a specific field when {conditionPropertyPathItemName} {displayStringOfConditionValue}{validatesWhenConditionNotSatisfiedDescription}
