# field validators
jp.ecuacion.lib.validation.constraints.SizeString.message.default             = size must be between {min} and {max}
jp.ecuacion.lib.validation.constraints.BooleanString.message.default          = must be a string which expresses boolean ("true", "false", "on", "off", "yes", "no", "t", "f", "y", "n", "\u25CB", "�")
jp.ecuacion.lib.validation.constraints.IntegerString.message.default          = must be common sense range integer
jp.ecuacion.lib.validation.constraints.LongString.message.default             = must be common sense range integer
jp.ecuacion.lib.validation.constraints.EnumElement.message.default            = must be an enum element of {enumClass}
jp.ecuacion.lib.validation.constraints.PatternWithDescription.message.default = must match the pattern: {description}

# class validators
jp.ecuacion.lib.validation.constraints.AnyNull.message.default                    = needs to be null
jp.ecuacion.lib.validation.constraints.AnyNotNull.message.default                 = needs not to be null
jp.ecuacion.lib.validation.constraints.AllNullOrAllNotNull.message.default        = needs to be null or not null
jp.ecuacion.lib.validation.constraints.AnyEmpty.message.default                   = needs to be empty
jp.ecuacion.lib.validation.constraints.AnyNotEmpty.message.default                = needs not to be empty
jp.ecuacion.lib.validation.constraints.AllEmptyOrAllNotEmpty.message.default      = needs to be empty or not empty
jp.ecuacion.lib.validation.constraints.GreaterThan.message.default                = needs to be greater than the value of {baselinePropertyPathItemName}
jp.ecuacion.lib.validation.constraints.GreaterThanOrEqualTo.message.default       = needs to be greater than or equal to the value of {baselinePropertyPathItemName}
jp.ecuacion.lib.validation.constraints.LessThan.message.default                   = needs to be less than the value of {baselinePropertyPathItemName}
jp.ecuacion.lib.validation.constraints.LessThanOrEqualTo.message.default          = needs to be less than or equal to the value of {baselinePropertyPathItemName}
jp.ecuacion.lib.validation.constraints.NullWhen.message.default                   = needs to be null when {conditionPropertyPathItemName} {displayStringOfConditionValue}{validatesWhenConditionNotSatisfiedDescription}
jp.ecuacion.lib.validation.constraints.NotNullWhen.message.default                = needs to be not null when {conditionPropertyPathItemName} {displayStringOfConditionValue}{validatesWhenConditionNotSatisfiedDescription}
jp.ecuacion.lib.validation.constraints.EmptyWhen.message.default                  = needs to be empty when {conditionPropertyPathItemName} {displayStringOfConditionValue}{validatesWhenConditionNotSatisfiedDescription}
jp.ecuacion.lib.validation.constraints.NotEmptyWhen.message.default               = needs to be not empty when {conditionPropertyPathItemName} {displayStringOfConditionValue}{validatesWhenConditionNotSatisfiedDescription}
jp.ecuacion.lib.validation.constraints.TrueWhen.message.default                   = needs to be true when {conditionPropertyPathItemName} {displayStringOfConditionValue}{validatesWhenConditionNotSatisfiedDescription}
jp.ecuacion.lib.validation.constraints.FalseWhen.message.default                  = needs to be false when {conditionPropertyPathItemName} {displayStringOfConditionValue}{validatesWhenConditionNotSatisfiedDescription}
jp.ecuacion.lib.validation.constraints.StringWhen.message.default                 = needs to be a specific value when {conditionPropertyPathItemName} {displayStringOfConditionValue}{validatesWhenConditionNotSatisfiedDescription}
jp.ecuacion.lib.validation.constraints.NotStringWhen.message.default              = needs to not be a specific value when {conditionPropertyPathItemName} {displayStringOfConditionValue}{validatesWhenConditionNotSatisfiedDescription}
jp.ecuacion.lib.validation.constraints.PatternWhen.message.default                = needs to match the pattern when {conditionPropertyPathItemName} {displayStringOfConditionValue}{validatesWhenConditionNotSatisfiedDescription}
jp.ecuacion.lib.validation.constraints.NotPatternWhen.message.default             = needs to not match the pattern when {conditionPropertyPathItemName} {displayStringOfConditionValue}{validatesWhenConditionNotSatisfiedDescription}
jp.ecuacion.lib.validation.constraints.ValueOfPropertyPathWhen.message.default    = needs to be the value of a specific field when {conditionPropertyPathItemName} {displayStringOfConditionValue}{validatesWhenConditionNotSatisfiedDescription}
jp.ecuacion.lib.validation.constraints.NotValueOfPropertyPathWhen.message.default = needs to not be the value of a specific field when {conditionPropertyPathItemName} {displayStringOfConditionValue}{validatesWhenConditionNotSatisfiedDescription}
