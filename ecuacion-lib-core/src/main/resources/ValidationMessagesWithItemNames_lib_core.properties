# jakarta validation standard messages with item names
jakarta.validation.constraints.AssertFalse.message.base     = {0} must be false. (input: {invalidValue})
jakarta.validation.constraints.AssertTrue.message.base      = {0} must be true. (input: {invalidValue})
jakarta.validation.constraints.DecimalMax.message.base      = {0} must be less than ${inclusive == true ? 'or equal to ' : ''}{value}. (input: {invalidValue})
jakarta.validation.constraints.DecimalMin.message.base      = {0} must be greater than ${inclusive == true ? 'or equal to ' : ''}{value}. (input: {invalidValue})
jakarta.validation.constraints.Digits.message.base          = {0}'s numeric value is out of bounds (<{integer} digits>.<{fraction} digits> expected). (input: {invalidValue})
jakarta.validation.constraints.Email.message.base           = {0} must be a well-formed email address. (input: {invalidValue})
jakarta.validation.constraints.Future.message.base          = {0} must be a future date. (input: {invalidValue})
jakarta.validation.constraints.FutureOrPresent.message.base = {0} must be a date in the present or in the future. (input: {invalidValue})
jakarta.validation.constraints.Max.message.base             = {0} must be less than or equal to {value}. (input: {invalidValue})
jakarta.validation.constraints.Min.message.base             = {0} must be greater than or equal to {value}. (input: {invalidValue})
jakarta.validation.constraints.Negative.message.base        = {0} must be less than 0. (input: {invalidValue})
jakarta.validation.constraints.NegativeOrZero.message.base  = {0} must be less than or equal to 0. (input: {invalidValue})
jakarta.validation.constraints.NotBlank.message.base        = {0} must not be blank.
jakarta.validation.constraints.NotEmpty.message.base        = {0} must not be empty.
jakarta.validation.constraints.NotNull.message.base         = {0} must not be null.
