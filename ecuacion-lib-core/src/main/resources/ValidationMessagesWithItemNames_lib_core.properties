jakarta.validation.constraints.Past.message.base            = {0} must be a past date. (input: {invalidValue})
jakarta.validation.constraints.PastOrPresent.message.base   = {0} must be a date in the past or in the present. (input: {invalidValue})
jakarta.validation.constraints.Pattern.message.base         = {0} must match "{regexp}". (input: {invalidValue})
jakarta.validation.constraints.Positive.message.base        = {0} must be greater than 0. (input: {invalidValue})
jakarta.validation.constraints.PositiveOrZero.message.base  = {0} must be greater than or equal to 0. (input: {invalidValue})
jakarta.validation.constraints.Size.message.base            = {0}'s size must be between {min} and {max}. (input: {invalidValue})
