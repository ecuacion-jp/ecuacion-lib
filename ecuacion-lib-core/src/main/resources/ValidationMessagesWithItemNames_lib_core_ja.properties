# jakarta validation standard messages with item names (ja)
jakarta.validation.constraints.AssertFalse.message.base     = {0}はfalseにしてください（入力値：{invalidValue}）
jakarta.validation.constraints.AssertTrue.message.base      = {0}はtrueにしてください（入力値：{invalidValue}）
jakarta.validation.constraints.DecimalMax.message.base      = {0}は{value}${inclusive == true ? '以下の値にしてください' : 'より小さな値にしてください'}（入力値：{invalidValue}）
jakarta.validation.constraints.DecimalMin.message.base      = {0}は{value}${inclusive == true ? '以上の値にしてください' : 'より大きな値にしてください'}（入力値：{invalidValue}）
jakarta.validation.constraints.Digits.message.base          = {0}の値は次の範囲にしてください (<整数 {integer} 桁>.<小数点以下 {fraction} 桁>)（入力値：{invalidValue}）
jakarta.validation.constraints.Email.message.base           = {0}は電子メールアドレスとして正しい形式にしてください（入力値：{invalidValue}）
jakarta.validation.constraints.Future.message.base          = {0}は未来の日付にしてください（入力値：{invalidValue}）
jakarta.validation.constraints.FutureOrPresent.message.base = {0}は現在もしくは未来の日付にしてください（入力値：{invalidValue}）
jakarta.validation.constraints.Max.message.base             = {0}は{value}以下の値にしてください（入力値：{invalidValue}）
jakarta.validation.constraints.Min.message.base             = {0}は{value}以上の値にしてください（入力値：{invalidValue}）
jakarta.validation.constraints.Negative.message.base        = {0}は0より小さな値にしてください（入力値：{invalidValue}）
jakarta.validation.constraints.NegativeOrZero.message.base  = {0}は0以下の値にしてください（入力値：{invalidValue}）
jakarta.validation.constraints.NotBlank.message.base        = {0}に空白は許可されていません
jakarta.validation.constraints.NotEmpty.message.base        = {0}に空要素は許可されていません
jakarta.validation.constraints.NotNull.message.base         = {0}にnullは許可されていません
jakarta.validation.constraints.Null.message.base            = {0}はnullにしてください（入力値：{invalidValue}）
jakarta.validation.constraints.Past.message.base            = {0}は過去の日付にしてください（入力値：{invalidValue}）
jakarta.validation.constraints.PastOrPresent.message.base   = {0}は現在もしくは過去の日付にしてください（入力値：{invalidValue}）
jakarta.validation.constraints.Pattern.message.base         = {0}は正規表現"{regexp}"にマッチさせてください（入力値：{invalidValue}）
jakarta.validation.constraints.Positive.message.base        = {0}は0より大きな値にしてください（入力値：{invalidValue}）
jakarta.validation.constraints.PositiveOrZero.message.base  = {0}は0以上の値にしてください（入力値：{invalidValue}）
jakarta.validation.constraints.Size.message.base            = {0}は{min}から{max}の間のサイズにしてください（入力値：{invalidValue}）
